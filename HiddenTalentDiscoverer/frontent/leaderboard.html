<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiddenTalent | Global Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #fcfdfe;
            --card-white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #cd7f32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            padding: 40px 20px; 
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 80px; }
        header h1 { font-size: 48px; font-weight: 800; color: var(--text-main); letter-spacing: -2px; }
        header p { color: var(--text-muted); letter-spacing: 3px; font-size: 11px; margin-top: 8px; font-weight: 800; }

        /* Podium Animations */
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .podium { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr 1fr; 
            gap: 24px; 
            align-items: flex-end; 
            max-width: 1100px; 
            margin: 0 auto 100px; 
        }
        
        .p-card {
            background: var(--card-white); 
            border: 1px solid var(--border-color); 
            border-radius: 32px;
            padding: 40px 20px; 
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        .rank-1 { border-bottom: 8px solid var(--gold); height: 460px; z-index: 2; animation-delay: 0.2s; }
        .rank-2 { border-bottom: 8px solid var(--silver); height: 380px; animation-delay: 0.1s; }
        .rank-3 { border-bottom: 8px solid var(--bronze); height: 340px; animation-delay: 0.3s; }

        .p-avatar {
            width: 80px; height: 80px; 
            border-radius: 50%; 
            background: #f8fafc;
            color: var(--text-main);
            margin: 0 auto 24px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800;
            border: 4px solid var(--border-color);
            position: relative;
        }

        .rank-1 .p-avatar { 
            width: 100px; height: 100px; font-size: 36px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white; border-color: #fef3c7;
        }

        .crown { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 40px; }

        .p-name { font-size: 22px; font-weight: 800; color: var(--text-main); display: block; }
        .p-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-top: 8px; letter-spacing: 1px; }
        .p-score { font-size: 56px; font-weight: 900; color: var(--text-main); display: block; margin-top: 15px; letter-spacing: -2px; }

        /* Rest of the List */
        .list-container { 
            max-width: 850px; margin: 0 auto; 
            background: var(--card-white); 
            border-radius: 32px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        
        .list-header {
            display: flex; padding: 25px 40px; background: #f8fafc;
            font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
        }

        .list-item {
            display: flex; align-items: center; padding: 25px 40px; 
            border-bottom: 1px solid var(--border-color);
            transition: 0.3s;
        }
        .list-item:hover { background: #fcfdfe; transform: scale(1.01); }
        .list-item:last-child { border-bottom: none; }
        
        .l-rank { width: 60px; font-weight: 800; color: var(--text-muted); font-size: 18px; }
        .l-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eff6ff; color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; margin-right: 20px; }
        .l-name { flex-grow: 1; font-weight: 700; font-size: 18px; color: var(--text-main); }
        .l-score { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 10px;
            margin: 60px auto; padding: 18px 40px; background: var(--text-main); color: #fff;
            text-decoration: none; border-radius: 20px; font-weight: 800; font-size: 14px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-back:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); background: #000; }

        /* Loader */
        .neural-loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 850px) {
            .podium { grid-template-columns: 1fr; padding: 0 20px; }
            .rank-1, .rank-2, .rank-3 { height: auto; }
            header h1 { font-size: 32px; }
            
        }
    </style>
</head>
<body>

<header>
    <h1>Global <span style="color:var(--primary)">Neural Rank</span></h1>
    <p>TOP PERFORMERS IN HIDDENTALENT NETWORK</p>
</header>

<div id="podium-wrapper">
    <div id="podium" class="podium">
        <div style="grid-column: span 3; text-align:center;">
            <div class="neural-loader"></div>
            <p style="font-weight: 800; color: var(--text-muted); font-size: 10px; letter-spacing: 2px;">SYNCING NEURAL DATA...</p>
        </div>
    </div>
</div>

<div class="list-container">
    <div class="list-header">
        <span style="width: 60px;">Rank</span>
        <span style="flex-grow: 1;">Candidate</span>
        <span>Neural Score</span>
    </div>
    <div id="list"></div>
</div>

<div style="text-align: center;">
    <a href="dashboard.html" class="btn-back">
        <i class="fas fa-arrow-left"></i> RETURN TO DASHBOARD
    </a>
</div>

<script>
    async function init() {
        const podium = document.getElementById('podium');
        const list = document.getElementById('list');

        try {
            const res = await fetch('http://localhost:5000/api/global-leaderboard');
            const data = await res.json();
            
            if (!data || data.length === 0) {
                podium.innerHTML = `<div style="grid-column: span 3; text-align:center; padding: 60px; font-weight:800; color:var(--text-muted);">NO NEURAL DATA RECORDED YET.</div>`;
                return;
            }

            // Sort data to ensure it's in descending order
            data.sort((a, b) => b.overallTotal - a.overallTotal);

            const t = data.slice(0, 3);
            
            // Render Podium with specific order (2, 1, 3) for visual balance
            podium.innerHTML = `
                <div class="p-card rank-2">
                    <div class="p-avatar">${(t[1]?.username || '2').charAt(0).toUpperCase()}</div>
                    <span class="p-name">${t[1]?.username || '---'}</span>
                    <div class="p-label">Silver Tier</div>
                    <span class="p-score">${t[1]?.overallTotal || 0}</span>
                </div>

                <div class="p-card rank-1">
                    <div class="crown">👑</div>
                    <div class="p-avatar">${(t[0]?.username || '1').charAt(0).toUpperCase()}</div>
                    <span class="p-name">${t[0]?.username || '---'}</span>
                    <div class="p-label">Elite Master</div>
                    <span class="p-score">${t[0]?.overallTotal || 0}</span>
                </div>

                <div class="p-card rank-3">
                    <div class="p-avatar">${(t[2]?.username || '3').charAt(0).toUpperCase()}</div>
                    <span class="p-name">${t[2]?.username || '---'}</span>
                    <div class="p-label">Bronze Tier</div>
                    <span class="p-score">${t[2]?.overallTotal || 0}</span>
                </div>
            `;

            // Render Remaining List (4th place onwards)
            if(data.length > 3) {
                list.innerHTML = data.slice(3).map((u, i) => `
                    <div class="list-item">
                        <div class="l-rank">#${i+4}</div>
                        <div class="l-avatar">${u.username.charAt(0).toUpperCase()}</div>
                        <div class="l-name">${u.username}</div>
                        <div class="l-score">${u.overallTotal}</div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = `<p style="padding:40px; text-align:center; color:var(--text-muted); font-weight:700;">Complete more assessments to fill the ranks!</p>`;
            }

        } catch(e) {
            podium.innerHTML = `
                <div style="grid-column: span 3; text-align:center; padding: 60px;">
                    <i class="fas fa-exclamation-triangle" style="font-size:40px; color:#f87171; margin-bottom:20px;"></i>
                    <p style="font-weight:800; color:var(--text-main);">NEURAL LINK DISCONNECTED</p>
                    <p style="font-size:12px; color:var(--text-muted); margin-top:5px;">Please ensure the backend server is running on port 5000.</p>
                </div>`;
        }
    }
    window.onload = init;
</script>

</body>
</html>
