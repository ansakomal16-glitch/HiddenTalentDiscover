<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Stream | Global Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #f8fafc;
            --card-white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --gold: #f59e0b;
            --silver: #94a3b8;
            --bronze: #b45309;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            padding: 40px 20px; 
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: 42px; font-weight: 800; color: var(--text-main); }
        header p { color: var(--text-muted); letter-spacing: 2px; font-size: 12px; margin-top: 5px; font-weight: 700; }

        /* Podium Layout */
        .podium { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr 1fr; 
            gap: 20px; 
            align-items: flex-end; 
            max-width: 1000px; 
            margin: 0 auto 80px; 
        }
        
        .p-card {
            background: var(--card-white); 
            border: 2px solid var(--border-color); 
            border-radius: 24px;
            padding: 40px 20px; 
            text-align: center;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        /* Standard Text Color (No Clipping) */
        .p-score { 
            font-size: 48px; 
            font-weight: 900; 
            color: var(--primary); 
            display: block;
            margin-top: 10px;
        }

        .rank-1 { border-color: var(--gold); height: 420px; }
        .rank-2 { border-color: var(--silver); height: 350px; }
        .rank-3 { border-color: var(--bronze); height: 320px; }

        .p-avatar {
            width: 80px; height: 80px; 
            border-radius: 50%; 
            background: #f1f5f9;
            color: var(--primary);
            margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 800;
            border: 4px solid var(--border-color);
        }

        .rank-1 .p-avatar { background: var(--gold); color: white; border-color: #fff; width: 90px; height: 90px; }

        .p-name { font-size: 20px; font-weight: 800; color: var(--text-main); }
        .p-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-top: 5px; }

        /* List Section */
        .list-container { 
            max-width: 800px; margin: 0 auto; 
            background: var(--card-white); 
            border-radius: 20px; 
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .list-item {
            display: flex; align-items: center; padding: 20px 30px; 
            border-bottom: 1px solid var(--border-color);
        }
        .list-item:last-child { border-bottom: none; }
        
        .l-rank { width: 50px; font-weight: 800; color: var(--text-muted); }
        .l-name { flex-grow: 1; font-weight: 700; font-size: 16px; color: var(--text-main); }
        .l-score { font-size: 20px; font-weight: 800; color: var(--primary); }

        .btn-back {
            display: block; width: fit-content; margin: 40px auto;
            padding: 15px 35px; background: var(--text-main); color: #fff;
            text-decoration: none; border-radius: 12px; font-weight: 700;
        }

        @media (max-width: 768px) {
            .podium { grid-template-columns: 1fr; }
            .rank-1, .rank-2, .rank-3 { height: auto; }
        }
    </style>
</head>
<body>

<header>
    <h1>Global <span style="color:var(--primary)">Leaderboard</span></h1>
    <p>TOP TALENT SYNCED VIA NEURAL STREAM</p>
</header>

<div id="podium" class="podium">
    </div>

<div class="list-container">
    <div id="list"></div>
</div>

<a href="dashboard.html" class="btn-back">RETURN TO DASHBOARD</a>

<script>
    async function init() {
        try {
            const res = await fetch('http://localhost:5000/api/global-leaderboard');
            const data = await res.json();
            
            const podium = document.getElementById('podium');
            const list = document.getElementById('list');

            if (!data || data.length === 0) {
                podium.innerHTML = `<div style="grid-column: span 3; text-align:center; padding: 40px;">Waiting for Neural Data...</div>`;
                return;
            }

            const t = data.slice(0, 3);
            
            // Top 3 (Podium)
            podium.innerHTML = `
                <div class="p-card rank-2">
                    <div class="p-avatar">${t[1]?.username.charAt(0) || '2'}</div>
                    <span class="p-name">${t[1]?.username || '---'}</span>
                    <div class="p-label">Silver Tier</div>
                    <span class="p-score">${t[1]?.overallTotal || 0}</span>
                </div>
                <div class="p-card rank-1">
                    <div style="font-size:30px; margin-bottom:10px;">👑</div>
                    <div class="p-avatar">${t[0]?.username.charAt(0) || '1'}</div>
                    <span class="p-name">${t[0]?.username || '---'}</span>
                    <div class="p-label">Elite Master</div>
                    <span class="p-score">${t[0]?.overallTotal || 0}</span>
                </div>
                <div class="p-card rank-3">
                    <div class="p-avatar">${t[2]?.username.charAt(0) || '3'}</div>
                    <span class="p-name">${t[2]?.username || '---'}</span>
                    <div class="p-label">Bronze Tier</div>
                    <span class="p-score">${t[2]?.overallTotal || 0}</span>
                </div>
            `;

            // The rest of the list
            list.innerHTML = data.slice(3).map((u, i) => `
                <div class="list-item">
                    <div class="l-rank">#${i+4}</div>
                    <div class="l-name">${u.username}</div>
                    <div class="l-score">${u.overallTotal}</div>
                </div>
            `).join('');

        } catch(e) {
            document.getElementById('podium').innerHTML = `<div style="grid-column: span 3; text-align:center; color:red;">⚠️ Server Connection Failed</div>`;
        }
    }
    window.onload = init;
</script>

</body>
</html>
