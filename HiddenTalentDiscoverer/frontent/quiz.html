<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Quiz – Hidden Talent Finder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ==== OVERRIDING TO ELEGANT WHITE THEME ==== */
        body.quiz-page {
            background: #f8fafc !important; /* Light background */
            color: #1e293b !important;
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR RE-DESIGN */
        header {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 10px 0 !important;
        }

        .navbar-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 10px 0;
        }

        .navbar-row a {
            color: #475569 !important; /* Soft Slate Gray */
            font-size: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .navbar-row a:hover {
            color: #6366f1 !important; /* Indigo Accent */
            transform: translateY(-2px);
        }

        /* Buttons in Navbar */
        .navbar-login {
            border: 2px solid #e2e8f0 !important;
            padding: 6px 18px !important;
            border-radius: 20px;
        }

        .navbar-signup {
            background: linear-gradient(135deg, #6366f1, #a855f7) !important;
            color: white !important;
            padding: 8px 22px !important;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .nav-green-line {
            background: #10b981 !important; /* Emerald green instead of neon */
            height: 3px !important;
            box-shadow: none !important;
        }

        /* PAGE TITLE */
        .page-title {
            color: #0f172a !important;
            font-weight: 800;
            margin-top: 60px !important;
            text-shadow: none !important;
            letter-spacing: -1px;
        }

        /* FIELD CARDS CONTAINER */
        .fields-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        /* SINGLE CARD WHITE LOOK */
        .field-card {
            width: 280px;
            background: #ffffff !important;
            padding: 30px 20px !important;
            border-radius: 24px !important;
            text-decoration: none !important;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        .field-card:hover {
            transform: translateY(-12px) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1) !important;
        }

        .field-card h3 {
            color: #1e293b !important;
            font-size: 20px !important;
            font-weight: 700 !important;
            margin-top: 15px;
        }

        .field-card img {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05));
        }

        /* QUIZ IMAGE ADJUSTMENT */
        .quiz-img {
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1)) !important;
            opacity: 0.9;
        }
    </style>
</head>

<body class="quiz-page">

    <header>
        <div class="navbar-row">
            <a href="index.html">Home</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="recomendation.html">Recommendations</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="badges.html">Badges</a>
            <a href="about.html">About Us</a>

            <a href="login.html" class="navbar-login">Login</a>
            <a href="signup.html" class="navbar-signup">Sign Up</a>
        </div>
        <div class="nav-green-line"></div>
    </header>
    <h1 class="page-title">Select Your Field</h1>

    <div class="fields-container">
        <a href="cs.html" class="field-card">
            <img src="https://cdn-icons-png.flaticon.com/512/906/906175.png" alt="CS">
            <h3>Computer Science</h3>
        </a>

        <a href="c-security.html" class="field-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="Cyber">
            <h3>Cyber Security</h3>
        </a>

        <a href="digital-marketing.html" class="field-card">
            <img src="https://cdn-icons-png.flaticon.com/512/1688/1688400.png" alt="Marketing">
            <h3>Digital Marketing</h3>
        </a>
    </div>

    <img src="https://png.pngtree.com/png-vector/20251013/ourmid/pngtree-cartoon-question-and-exclamation-marks-with-funny-emoji-faces-png-image_17711065.webp" class="quiz-img">

</body>
</html>
