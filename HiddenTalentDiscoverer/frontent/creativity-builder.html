<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creativity Builder</title>
    <link rel="stylesheet" href="math-sparks.css" />

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="game-container">
        <h1 class="title">🎨 Creativity Builder</h1>
        <p class="subtitle">Give Creative Names to Random Shapes</p>

        <div id="timer">10</div>
        <div id="optA"></div>
        <div id="optB"></div>

        <div class="shape-box" id="shapeBox"></div>

        <input type="text" id="creativeInput" placeholder="Type creative name..." />

        <button id="startBtn">START GAME</button>

        <div id="result"></div>
    </div>

    <script src="creativity-builder.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
