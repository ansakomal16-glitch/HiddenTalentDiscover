<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Settings | Hidden Talent</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg-body: #ffffff;
            --bg-offset: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text-dark); }

        /* Navbar */
        header {
            height: 80px; padding: 0 8%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Outfit'; font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #000; }
        .logo span { color: var(--primary); }

        /* Main Profile Layout */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr; gap: 40px; }

        /* Sidebar Identity */
        .sidebar {
            background: var(--bg-offset); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px 30px; text-align: center; height: fit-content;
        }

        /* Image Upload UI */
        .profile-pic-wrapper {
            position: relative; width: 140px; height: 140px; margin: 0 auto 25px;
        }
        #profileImage {
            width: 140px; height: 140px; border-radius: 40px; object-fit: cover;
            border: 4px solid #fff; box-shadow: var(--shadow); background: var(--primary);
        }
        .upload-trigger {
            position: absolute; bottom: -10px; right: -10px;
            background: #fff; width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .upload-trigger:hover { transform: scale(1.1); color: var(--primary); }
        #fileInput { display: none; }

        .user-info h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .user-info p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; }

        /* Form Styling */
        .form-section { background: #fff; border-radius: 24px; }
        .section-title { font-family: 'Outfit'; font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 15px 20px; border-radius: 14px; border: 1px solid var(--border);
            font-size: 1rem; font-weight: 500; background: var(--bg-offset); outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .btn-save {
            background: var(--text-dark); color: #fff; padding: 18px 30px; border-radius: 16px;
            border: none; font-weight: 700; font-size: 1rem; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-save:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); }

        /* Responsive */
        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; }
            .sidebar { order: 1; }
            .form-section { order: 2; }
        }
        
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">HIDDEN<span>TALENT.</span></a>
    <nav><a href="dashboard.html" style="text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 0.8rem;">BACK TO PANEL</a></nav>
</header>

<div class="container">
    <div class="grid-layout">
        <aside class="sidebar">
            <div class="profile-pic-wrapper">
                <img id="profileImage" src="https://ui-avatars.com/api/?name=User&background=4f46e5&color=fff&size=128" alt="Profile">
                
                <label for="fileInput" class="upload-trigger">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="user-info">
                <h2 id="sideName">New Explorer</h2>
                <p id="sideEmail">email@example.com</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <span style="background: #fff; padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: 1px solid var(--border);">LEVEL 1</span>
                    <span style="background: #eef2ff; color: var(--primary); padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800;">VERIFIED</span>
                </div>
            </div>
        </aside>

        <main class="form-section">
            <h1 class="section-title">Personal Settings</h1>
            
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="inputName" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Professional Bio</label>
                <textarea id="inputBio" rows="3" placeholder="Tell us about your mission..."></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="input-group">
                    <label>Primary Skill</label>
                    <input type="text" id="inputSkill" placeholder="e.g. UX Design">
                </div>
                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="inputLocation" placeholder="e.g. London, UK">
                </div>
            </div>

            <button class="btn-save" onclick="saveProfileData()">
                <i class="fas fa-save"></i> SAVE CHANGES
            </button>
        </main>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const profileImage = document.getElementById('profileImage');

    // 1. Handle Image Selection & Preview
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                profileImage.src = e.target.result;
                // Save image to localStorage (Base64 string)
                localStorage.setItem("userAvatar", e.target.result);
            }
            reader.readAsDataURL(file);
        }
    });

    // 2. Load Data on Page Start
    window.onload = function() {
        const savedName = localStorage.getItem("userName");
        const savedEmail = localStorage.getItem("userEmail");
        const savedBio = localStorage.getItem("userBio");
        const savedAvatar = localStorage.getItem("userAvatar");

        if(savedName) {
            document.getElementById("inputName").value = savedName;
            document.getElementById("sideName").innerText = savedName;
        }
        if(savedEmail) document.getElementById("sideEmail").innerText = savedEmail;
        if(savedBio) document.getElementById("inputBio").value = savedBio;
        if(savedAvatar) profileImage.src = savedAvatar;
    };

    // 3. Save All Data
    function saveProfileData() {
        const name = document.getElementById("inputName").value;
        const bio = document.getElementById("inputBio").value;

        localStorage.setItem("userName", name);
        localStorage.setItem("userBio", bio);

        // UI Update
        document.getElementById("sideName").innerText = name;
        
        // Success Notification
        const btn = document.querySelector('.btn-save');
        btn.innerHTML = '<i class="fas fa-check"></i> SETTINGS UPDATED';
        btn.style.background = "#10b981";
        
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-save"></i> SAVE CHANGES';
            btn.style.background = "var(--text-dark)";
        }, 2000);
    }
</script>

</body>
</html>
