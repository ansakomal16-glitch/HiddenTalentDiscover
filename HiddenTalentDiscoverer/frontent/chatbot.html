<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f8fafc;
}

header {
    background: #6366f1;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    width: 100%;
    height: calc(100vh - 60px);
    display: flex;
    justify-content: center;
    align-items: center;
}

.chat-box {
    width: 90%;
    max-width: 900px;
    height: 90%;
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    overflow: hidden;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<header>
🤖 AI  Chatbot
</header>

<div class="container">
    <div class="chat-box">

        <!-- BOTPRESS CHATBOT -->
        <iframe 
            src="https://cdn.botpress.cloud/webchat/v3.6/shareable.html?configUrl=https://files.bpcontent.cloud/2026/04/24/18/20260424185105-9LKBJ3B5.json">
        </iframe>

    </div>
</div>

</body>
</html>
