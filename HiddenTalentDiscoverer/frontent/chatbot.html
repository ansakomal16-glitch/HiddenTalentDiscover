<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Scout | Professional AI Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; /* Indigo */
            --bg: #f8fafc; 
            --text-main: #1e293b;
            --chat-bg: #ffffff;
            --user-bubble: #6366f1;
            --ai-bubble: #f1f5f9;
        }

        body { 
            background: var(--bg);
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Navbar Modern White */
        header {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
            position: sticky; top: 0; z-index: 100;
        }

        .navbar-row {
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }

        .navbar-row a {
            color: #64748b; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s;
        }

        .navbar-row a:hover { color: var(--primary); }

        /* Chat Layout */
        #ai-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }

        #ai-container { 
            width: 100%; max-width: 800px; height: 80vh; 
            background: var(--chat-bg); 
            border: 1px solid #e2e8f0; 
            border-radius: 24px; display: flex; flex-direction: column; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .header { 
            padding: 20px; text-align: center; border-bottom: 1px solid #f1f5f9;
            font-size: 12px; font-weight: 800; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px;
        }

        #chat-box { 
            flex: 1; padding: 30px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent;
        }

        .bubble { 
            max-width: 75%; padding: 14px 18px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        .user-m { 
            align-self: flex-end; background: var(--user-bubble); 
            color: #fff; border-bottom-right-radius: 2px;
        }

        .ai-m { 
            align-self: flex-start; background: var(--ai-bubble); 
            color: var(--text-main); border-bottom-left-radius: 2px;
            border: 1px solid #e2e8f0;
        }

        /* Input Area */
        .footer { 
            padding: 20px 30px; display: flex; gap: 10px; 
            background: #fff; border-top: 1px solid #f1f5f9;
            border-radius: 0 0 24px 24px;
        }

        input { 
            flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; 
            padding: 14px 20px; border-radius: 12px; 
            color: #1e293b; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: #fff; }

        button { 
            background: var(--primary); border: none; 
            padding: 0 25px; border-radius: 12px; 
            font-weight: 700; color: #fff; cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #4f46e5; transform: translateY(-1px); }

    </style>
</head>
<body>

<header>
    <div class="navbar-row">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="recommendations.html">Recommendations</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="badges.html">Badges</a>
    </div>
</header>

<div id="ai-wrapper">
    <div id="ai-container">
        <div class="header">● Neural Scout AI Mentor</div>
        <div id="chat-box">
            <div class="bubble ai-m">
                Hello! I am your <strong>Neural Scout</strong>. <br>
                Share your skills or interests, and I will decode the perfect career path for you.
            </div>
        </div>
        <div class="footer">
            <input type="text" id="userInput" placeholder="Ask me anything about your career...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('userInput');

    function sendMsg() {
        const val = input.value.trim();
        if(!val) return;

        addBubble('user-m', val);
        input.value = '';

        // Typing indicator
        const typing = document.createElement('div');
        typing.className = 'bubble ai-m';
        typing.innerText = "...";
        chatBox.appendChild(typing);
        chatBox.scrollTop = chatBox.scrollHeight;

        setTimeout(() => {
            chatBox.removeChild(typing);
            const reply = getAIAnalysis(val);
            addBubble('ai-m', reply);
        }, 800);
    }

    function getAIAnalysis(msg) {
        msg = msg.toLowerCase();
        if(msg.includes("code") || msg.includes("web")) 
            return "Based on your interest in coding, I suggest focusing on **Full-Stack Development**. You have the right logic for scalable systems.";
        if(msg.includes("design") || msg.includes("art"))
            return "Your creative patterns suggest a career in **UI/UX Design** or Brand Identity.";
        return "That's interesting! Tell me more about your favorite project so I can analyze your talent profile more deeply.";
    }

    function addBubble(cls, txt) {
        const div = document.createElement('div');
        div.className = `bubble ${cls}`;
        div.innerHTML = txt; 
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>

</body>
</html>
