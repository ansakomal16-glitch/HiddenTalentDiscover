<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security - FIELD</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* ==== GLOBAL WHITE ELEGANT THEME ==== */
        body {
            background: #f8fafc !important; /* Premium Off-White */
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: #1e293b;
        }

        /* NAVBAR RE-DESIGN */
        header {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 10px 0 !important;
            text-align: center;
        }

        .navbar-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 10px 0;
        }

        .navbar-row a {
            color: #475569 !important;
            font-size: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .navbar-row a:hover {
            color: #6366f1 !important;
            transform: translateY(-2px);
        }

        .title-typing {
            font-size: 2.5rem;
            color: #6366f1;
            margin: 10px 0;
            font-weight: 800;
        }

        /* Buttons in Navbar */
        .navbar-login {
            border: 2px solid #e2e8f0 !important;
            padding: 6px 18px !important;
            border-radius: 20px;
        }

        .navbar-signup {
            background: linear-gradient(135deg, #6366f1, #a855f7) !important;
            color: white !important;
            padding: 8px 22px !important;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* CONTAINER */
        .cs-container {
            width: 100%;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            font-size: 3rem;
            color: #0f172a;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: -1px;
            text-shadow: none !important;
        }

        /* BUTTONS DESIGN */
        .cs-btn {
            display: block;
            width: 500px; /* Thoda wide rakha hai premium look ke liye */
            margin: 20px auto;
            padding: 22px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #475569;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateX(-40px);
            animation: showBtns 1s ease forwards;
        }

        /* Button Hover Effect */
        .cs-btn:hover {
            transform: scale(1.03) translateY(-5px);
            background: #6366f1;
            color: white;
            border-color: #6366f1;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.2);
        }

        /* Animation Show */
        @keyframes showBtns {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* Delay for each button */
        .cs-btn:nth-child(2) { animation-delay: 0.2s; }
        .cs-btn:nth-child(3) { animation-delay: 0.4s; }
        .cs-btn:nth-child(4) { animation-delay: 0.6s; }
        .cs-btn:nth-child(5) { animation-delay: 0.8s; }

    </style>
</head>
<body>

<header>
    <div class="navbar-row">
        <a href="index.html">Home</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="recommendations.html">Recommendations</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <a href="badges.html">Badges</a>
        <a href="about.html">About Us</a>

        <a href="login.html" class="navbar-login">Login</a>
        <a href="signup.html" class="navbar-signup">Sign Up</a>
    </div>
    <h1 class="title-typing">T-Quiz</h1>
</header>

<div class="cs-container">
    <h1>Cyber Security Fields</h1>

    <button class="cs-btn" onclick="window.location.href='ethical.html'">
        Ethical Hacking
    </button>

    <button class="cs-btn" onclick="window.location.href='network.html'">
        Network Security
    </button>

    <button class="cs-btn" onclick="window.location.href='info-security.html'">
        Information Security
    </button>

    <button class="cs-btn" onclick="window.location.href='malware.html'">
        Malware Analysis
    </button>
</div>

</body>
</html>
